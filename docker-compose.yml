services:

  # ── MariaDB ──────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.4
    container_name: f3-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE:      ${DB_NAME:-f3_production}
      MARIADB_USER:          ${DB_USER:-f3user}
      MARIADB_PASSWORD:      ${DB_PASS:-f3password}
    volumes:
      - f3-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Node.js API + served React app ───────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f3-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT:     3001
      DB_HOST:  db
      DB_PORT:  3306
      DB_NAME:  ${DB_NAME:-f3_production}
      DB_USER:  ${DB_USER:-f3user}
      DB_PASS:  ${DB_PASS:-f3password}
      JWT_SECRET: ${JWT_SECRET:f0985b3eeaf9eaea6d99ef7c6f375d5d52e4c464cd98e244b5b14873dfa6b14a}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 60s

volumes:
  f3-db-data:
